name: yuque_notes
description: NoteYourNeed - note-taking app with nested folders and markdown documents.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.5
  sqflite_common_ffi_web: ^1.1.2
  path_provider: ^2.1.5
  path: ^1.9.1
  crypto: ^3.0.6
  shared_preferences: ^2.5.3
  flutter_quill: ^11.4.1
  markdown_quill: ^4.3.0
  markdown: ^7.3.0
  file_picker: ^8.3.7
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_logo.png